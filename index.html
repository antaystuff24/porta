<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLACHT - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            height: auto;
        }

        body {
            font-family: 'Shadows Into Light', cursive;
            background-color: #E8E2D5;
            color: #1E3A8A;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            height: auto;
            background-color: rgba(232, 226, 213, 0.55);
            pointer-events: none;
            z-index: 0;
        }

        /* Decoraciones de fondo - ahora con soporte para imágenes */
        .bg-decoration {
            position: fixed;
            opacity: 0.08;
            color: #1E3A8A;
            font-size: 2rem;
            pointer-events: none;
            z-index: 0;
            /* NUEVO: Para imágenes dentro */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* NUEVO: Estilos para imágenes dentro de bg-decoration */
        .bg-decoration img {
            width: 40px; /* Tamaño del ícono */
            height: 40px;
            object-fit: contain;
            opacity: 1; /* Hereda la opacidad del padre o ponla aquí */
        }

        /* Puedes ajustar tamaño individual por ícono si quieres */
        .bg-decoration:nth-child(1) { top: 10%; left: 5%; transform: rotate(-15deg); }
        .bg-decoration:nth-child(2) { top: 20%; right: 10%; transform: rotate(25deg); }
        .bg-decoration:nth-child(3) { bottom: 30%; left: 8%; transform: rotate(-10deg); }
        .bg-decoration:nth-child(4) { bottom: 15%; right: 5%; transform: rotate(20deg); }
        .bg-decoration:nth-child(5) { top: 50%; left: 3%; transform: rotate(-30deg); }
        .bg-decoration:nth-child(6) { top: 60%; right: 8%; transform: rotate(15deg); }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px 0 20px 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUpRotateAbout {
            from {
                opacity: 0;
                transform: translateY(60px) rotate(-8deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-8deg);
            }
        }

        @keyframes slideUpRotatePortfolio {
            from {
                opacity: 0;
                transform: translateY(60px) rotate(-5deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-5deg);
            }
        }

        @keyframes slideUpRotateContact {
            from {
                opacity: 0;
                transform: translateY(60px) rotate(-3deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-3deg);
            }
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            opacity: 0;
            animation: slideUp 0.8s ease-out forwards;
        }

        .logo-placeholder {
            width: 350px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            opacity: 1;
        }

        .logo-placeholder img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .skeleton-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: slideUp 0.8s ease-out 0.2s forwards;
        }

        .description-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            opacity: 0;
            animation: slideUp 0.8s ease-out 0.4s forwards;
        }

        .description {
            text-align: center;
            font-size: 1.5rem;
            color: #1E3A8A;
            max-width: 600px;
            line-height: 1.4;
        }

        .social-button {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .social-button:hover {
            transform: scale(1.15);
        }

        .social-button img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .skeleton-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .skeleton-placeholder {
            width: 100%;
            max-width: 800px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            opacity: 0.6;
        }

        .skeleton-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-button {
            position: absolute;
            text-decoration: none;
            color: #1E3A8A;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 10px 20px;
            transition: all 0.3s ease;
            display: inline-block;
            z-index: 10;
            text-shadow: 2px 2px 0px #E8E2D5, -1px -1px 0px #E8E2D5, 1px -1px 0px #E8E2D5, -1px 1px 0px #E8E2D5, 1px 1px 0px #E8E2D5;
            opacity: 0;
        }

        .nav-button:hover {
            transform: scale(1.1) rotate(0deg) !important;
            text-shadow: 3px 3px 6px rgba(30, 58, 138, 0.4), 2px 2px 0px #E8E2D5, -1px -1px 0px #E8E2D5, 1px -1px 0px #E8E2D5, -1px 1px 0px #E8E2D5, 1px 1px 0px #E8E2D5;
        }

        .btn-about {
            top: 20%;
            left: 10%;
            animation: slideUpRotateAbout 0.6s ease-out 0.6s forwards;
        }

        .btn-portfolio {
            top: 35%;
            left: 5%;
            animation: slideUpRotatePortfolio 0.6s ease-out 0.8s forwards;
        }

        .btn-contact {
            bottom: 25%;
            right: 10%;
            animation: slideUpRotateContact 0.6s ease-out 1s forwards;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
                align-items: flex-start;
            }

            .container {
                gap: 15px;
                padding: 30px 0 15px 0;
            }

            .logo-placeholder {
                width: 280px;
                height: 160px;
            }

            .skeleton-container {
                max-width: 100%;
            }

            .skeleton-placeholder {
                max-width: 100%;
                height: 400px;
            }

            /* Tamaño de íconos de fondo en tablet */
            .bg-decoration img {
                width: 30px;
                height: 30px;
            }

            .description-wrapper {
                gap: 20px;
                margin-top: 15px;
            }

            .description {
                font-size: 1.3rem;
                max-width: 500px;
            }

            .social-button {
                width: 40px;
                height: 40px;
            }

            .nav-button {
                font-size: 1.6rem;
                padding: 8px 15px;
            }

            .btn-about {
                top: 15%;
                left: 5%;
            }

            .btn-portfolio {
                top: 30%;
                left: 0%;
            }

            .btn-contact {
                bottom: 20%;
                right: 5%;
            }

            .bg-decoration {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                min-height: 100vh;
                min-height: -webkit-fill-available;
                align-items: flex-start;
            }

            body::before {
                position: absolute;
                min-height: 100vh;
                min-height: -webkit-fill-available;
                height: auto;
            }

            .container {
                gap: 10px;
                padding: 20px 0 10px 0;
            }

            .logo-placeholder {
                width: 220px;
                height: 125px;
            }

            .skeleton-wrapper {
                width: 100%;
                overflow: hidden;
            }

            .skeleton-container {
                max-width: 100%;
            }

            .skeleton-placeholder {
                height: 300px;
                max-width: 100%;
            }

            /* Tamaño de íconos de fondo en móvil */
            .bg-decoration img {
                width: 25px;
                height: 25px;
            }

            .description-wrapper {
                flex-direction: column;
                gap: 12px;
                margin-top: 10px;
            }

            .description {
                font-size: 1.1rem;
                max-width: 100%;
                padding: 0 10px;
                line-height: 1.3;
            }

            .social-button {
                width: 35px;
                height: 35px;
            }

            .description-wrapper .social-button:first-child {
                order: 1;
            }
            .description-wrapper .social-button:last-child {
                order: 3;
            }
            .description {
                order: 2;
            }

            .nav-button {
                font-size: 1.3rem;
                padding: 6px 12px;
            }

            .btn-about {
                top: 10%;
                left: 2%;
            }

            .btn-portfolio {
                top: 25%;
                left: -2%;
            }

            .btn-contact {
                bottom: 15%;
                right: 2%;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 15px 0 10px 0;
            }

            .logo-placeholder {
                width: 180px;
                height: 100px;
            }

            .skeleton-container {
                transform: scale(0.85);
            }

            .skeleton-placeholder {
                height: 250px;
            }

            /* Tamaño de íconos de fondo en móvil pequeño */
            .bg-decoration img {
                width: 20px;
                height: 20px;
            }

            .description-wrapper {
                gap: 10px;
            }

            .description {
                font-size: 1rem;
            }

            .social-button {
                width: 32px;
                height: 32px;
            }

            .nav-button {
                font-size: 1.1rem;
                padding: 5px 10px;
            }

            .btn-about {
                top: 8%;
                left: 0%;
            }

            .btn-portfolio {
                top: 22%;
                left: -5%;
            }

            .btn-contact {
                bottom: 12%;
                right: 0%;
            }
        }
    </style>
</head>
<body>
    <!-- Decoraciones de fondo - ahora puedes usar imágenes o caracteres -->
    <div class="bg-decoration">◆</div>
    <div class="bg-decoration"><img src="Images/icon.png" alt="icono"></div>
    <div class="bg-decoration">✦</div>
    <div class="bg-decoration">◈</div>
    <div class="bg-decoration">◇</div>
    <div class="bg-decoration"><img src="Images/icon.png" alt="icono"></div>

    <div class="container">
        <div class="logo-container">
            <div class="logo-placeholder">
                <span><img src="Images/logo.png" alt="TLACHT Logo"></span>
            </div>
        </div>

        <div class="skeleton-wrapper">
            <div class="skeleton-container">
                <div class="skeleton-placeholder">
                    <span><img src="Images/1.png" alt="Esqueleto"></span>
                </div>
                
                <a href="https://ejemplo-about.com" class="nav-button btn-about" target="_blank">ABOUT</a>
                <a href="https://ejemplo-portfolio.com" class="nav-button btn-portfolio" target="_blank">PORTFOLIO</a>
                <a href="https://ejemplo-contact.com" class="nav-button btn-contact" target="_blank">CONTACT</a>
            </div>
        </div>

        <div class="description-wrapper">
            <a href="https://behance.net/tuusuario" class="social-button" target="_blank" title="Behance">
                <img src="Images/icon.png" alt="Behance">
            </a>
            
            <p class="description">
                Ilustrador y diseñador gráfico especializado en arte conceptual y visualización creativa.
            </p>
            
            <a href="https://artstation.com/tuusuario" class="social-button" target="_blank" title="ArtStation">
                <img src="Images/icon.png" alt="ArtStation">
            </a>
        </div>
    </div>
</body>
</html>
