<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLACHT - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            height: auto;
        }

        body {
            font-family: 'Shadows Into Light', cursive;
            background-color: #E8E2D5;
            color: #1E3A8A;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            height: auto;
            background-color: rgba(232, 226, 213, 0.55);
            pointer-events: none;
            z-index: 0;
        }

        /* Columnas laterales tipo códice */
        .codex-column {
            position: fixed;
            top: 0;
            width: 80px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 20px 0;
            z-index: 0;
            pointer-events: none;
        }

        .codex-column.left {
            left: 10px;
        }

        .codex-column.right {
            right: 10px;
        }

        /* Cuadros del códice - solo imágenes */
        .codex-item {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }

        .codex-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* DECORACIONES FLOTANTES - Posiciones con clases específicas */
        .bg-decoration {
            position: fixed;
            opacity: 0.50;
            color: #1E3A8A;
            font-size: 2rem;
            pointer-events: none;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-decoration img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            opacity: 0.85;
        }

        /* CORRECCIÓN: Clases específicas en lugar de nth-child */
        .bg-decoration.pos-1 { top: 10%; left: 10%; transform: rotate(-15deg); } /*izq 1*/
        .bg-decoration.pos-2 { top: 20%; right: 20%; transform: rotate(25deg); } /*der 1*/
        .bg-decoration.pos-3 { bottom: 30%; left: 8%; transform: rotate(-10deg); } /*izq 3*/
        .bg-decoration.pos-4 { bottom: 10%; right: 11%; transform: rotate(20deg); } /*der 3*/
        .bg-decoration.pos-5 { top: 30%; left: 15%; transform: rotate(-30deg); } /*izq 2*/
        .bg-decoration.pos-6 { top: 50%; right: 8%; transform: rotate(15deg); } /*der 2*/

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px 0 20px 0;
            margin-left: 100px;
            margin-right: 100px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUpRotateAbout {
            from {
                opacity: 0;
                transform: translateY(60px) rotate(-8deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-8deg);
            }
        }

        @keyframes slideUpRotatePortfolio {
            from {
                opacity: 0;
                transform: translateY(60px) rotate(-5deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-5deg);
            }
        }

        @keyframes slideUpRotateContact {
            from {
                opacity: 0;
                transform: translateY(60px) rotate(-3deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(-3deg);
            }
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            opacity: 0;
            animation: slideUp 0.5s ease-out forwards;
        }

        .logo-placeholder {
            width: 350px;
            height: 200px;
            display: flex;
            padding-right: 15px;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            opacity: 1;
        }

        .logo-placeholder img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .skeleton-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: slideUp 0.5s ease-out 0.2s forwards;
        }

        .description-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            opacity: 0;
            animation: slideUp 0.5s ease-out 0.4s forwards;
        }

        .description {
            text-align: center;
            font-size: 1.5rem;
            color: #1E3A8A;
            max-width: 600px;
            line-height: 1.4;
        }

        .social-button {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .social-button:hover {
            transform: scale(1.15);
        }

        .social-button img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .skeleton-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .skeleton-placeholder {
            width: 100%;
            max-width: 800px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            opacity: 0.6;
        }

        .skeleton-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-button {
            position: absolute;
            text-decoration: none;
            color: #1E3A8A;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 10px 20px;
            transition: all 0.3s ease;
            display: inline-block;
            z-index: 10;
            text-shadow: 2px 2px 0px #E8E2D5, -1px -1px 0px #E8E2D5, 1px -1px 0px #E8E2D5, -1px 1px 0px #E8E2D5, 1px 1px 0px #E8E2D5;
            opacity: 0;
        }

        .nav-button:hover {
            transform: scale(1.1) rotate(0deg) !important;
            text-shadow: 3px 3px 6px rgba(30, 58, 138, 0.4), 2px 2px 0px #E8E2D5, -1px -1px 0px #E8E2D5, 1px -1px 0px #E8E2D5, -1px 1px 0px #E8E2D5, 1px 1px 0px #E8E2D5;
        }

        .btn-about {
            top: 20%;
            left: 10%;
            animation: slideUpRotateAbout 0.6s ease-out 0.6s forwards;
        }

        .btn-portfolio {
            top: 35%;
            left: 5%;
            animation: slideUpRotatePortfolio 0.7s ease-out 0.8s forwards;
        }

        .btn-contact {
            bottom: 25%;
            right: 10%;
            animation: slideUpRotateContact 0.8s ease-out 1s forwards;
        }




        /* ------------ RESPONSIVES ------------ */
        @media (max-width: 1100px) {
            .codex-column {
                width: 60px;
            }
            .codex-item {
                width: 65px;
                height: 65px;
            }
            .container {
                margin-left: 80px;
                margin-right: 80px;
            }
        }

        @media (max-width: 900px) {
            .codex-column {
                width: 50px;
            }
            .codex-item {
                width: 60px;
                height: 60px;
            }
            .container {
                margin-left: 70px;
                margin-right: 70px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
                align-items: flex-start;
            }

            .codex-column {
                width: 40px;
            }
            .codex-column.left {
                left: 5px;
            }
            .codex-column.right {
                right: 5px;
            }
            .codex-item {
                width: 50px;
                height: 50px;
            }
            
            .container {
                margin-left: 50px;
                margin-right: 50px;
                gap: 15px;
                padding: 30px 0 15px 0;
            }

            .logo-placeholder {
                width: 280px;
                height: 160px;
            }

            .skeleton-container {
                max-width: 100%;
            }

            .skeleton-placeholder {
                max-width: 100%;
                height: 400px;
            }

            .bg-decoration img {
                width: 70px;
                height: 70px;
            }

            .description-wrapper {
                gap: 20px;
                margin-top: 15px;
            }

            .description {
                font-size: 1.3rem;
                max-width: 500px;
            }

            .social-button {
                width: 40px;
                height: 40px;
            }

            .nav-button {
                font-size: 1.6rem;
                padding: 8px 15px;
            }

            .btn-about {
                top: 15%;
                left: 5%;
            }

            .btn-portfolio {
                top: 30%;
                left: 0%;
            }

            .btn-contact {
                bottom: 20%;
                right: 5%;
            }

            .bg-decoration {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                min-height: 100vh;
                min-height: -webkit-fill-available;
                align-items: flex-start;
            }

            body::before {
                position: absolute;
                min-height: 100vh;
                min-height: -webkit-fill-available;
                height: auto;
            }

            .codex-column {
                width: 45px;
                padding: 10px 0;
            }
            .codex-column.left {
                left: -8px;
            }
            .codex-column.right {
                right: -8px;
            }
            .codex-item {
                width: 60px;
                height: 60px;
            }
            
            .container {
                margin-left: 40px;
                margin-right: 40px;
                gap: 10px;
                padding: 20px 0 10px 0;
            }

            .logo-placeholder {
                width: 250px;
                height: 170px;
            }

            .skeleton-wrapper {
                width: 100%;
                overflow: hidden;
            }

            .skeleton-container {
                max-width: 150%;
            }

            .skeleton-placeholder {
                height: 300px;
                max-width: 100%;
            }

            .bg-decoration img {
                width: 70px;
                height: 70px;
            }

            .description-wrapper {
                flex-direction: column;
                gap: 12px;
                margin-top: 10px;
            }

            .description {
                font-size: 1.1rem;
                max-width: 100%;
                padding: 0 10px;
                line-height: 1.3;
            }

            .social-button {
                width: 35px;
                height: 35px;
            }

            .description-wrapper .social-button:first-child {
                order: 1;
            }
            .description-wrapper .social-button:last-child {
                order: 3;
            }
            .description {
                order: 2;
            }

            .nav-button {
                font-size: 1.3rem;
                padding: 6px 12px;
            }

            .btn-about {
                top: 10%;
                left: 2%;
            }

            .btn-portfolio {
                top: 25%;
                left: -2%;
            }

            .btn-contact {
                bottom: 15%;
                right: 2%;
            }
        }

        @media (max-width: 360px) {
            .codex-column {
                width: 40px;
            }
            .codex-item {
                width: 50px;
                height: 50px;
            }
            
            .codex-column.left {
                left: -16px;
            }
            .codex-column.right {
                right: -16px;
            }

            .container {
                margin-left: 35px;
                margin-right: 35px;
                padding: 15px 0 10px 0;
            }

            .logo-placeholder {
                width: 250px;
                height: 170px;
            }

            .skeleton-container {
                transform: scale(1);
            }

            .skeleton-placeholder {
                height: 250px;
            }

            .bg-decoration img {
                width: 60px;
                height: 60px;
            }

            .description-wrapper {
                gap: 10px;
            }

            .description {
                font-size: 1rem;
            }

            .social-button {
                width: 32px;
                height: 32px;
            }

            .nav-button {
                font-size: 1.1rem;
                padding: 5px 10px;
            }

            .btn-about {
                top: 8%;
                left: 0%;
            }

            .btn-portfolio {
                top: 22%;
                left: -5%;
            }

            .btn-contact {
                bottom: 12%;
                right: 0%;
            }
        }
    </style>
</head>
<body>

    <div class="bg-decoration pos-1"><img src="Images/icon2.png" alt="icono"></div>
    <div class="bg-decoration pos-2"><img src="Images/icon.png" alt="icono"></div>
    <div class="bg-decoration pos-3"><img src="Images/icon2.png" alt="icono"></div>

    <div class="container">
        <div class="logo-container">
            <div class="logo-placeholder">
                <span><img src="Images/logo.png" alt="TLACHT Logo"></span>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const leftColumn = document.getElementById('codex-left');
            const rightColumn = document.getElementById('codex-right');
            
            let ticking = false;

            function updateParallax() {
                const scrollY = window.scrollY;
                
                leftColumn.style.transform = `translateY(${-scrollY * 0.5}px)`;
                rightColumn.style.transform = `translateY(${-scrollY * 0.5}px)`;
                
                ticking = false;
            }

            window.addEventListener('scroll', function() {
                if (!ticking) {
                    window.requestAnimationFrame(updateParallax);
                    ticking = true;
                }
            });
        });
    </script>

</html>
